  <!--
    ============================================================
    SEO: Production domain is https://nightofangels2026.com
    The 1200x630 share image lives at /public/og-image.jpg.
    Keep the JSON-LD (Event / FAQ) below in sync with the app
    content in src/app/config/event.config.ts and faq.component.ts.
    Per-page title/description/canonical/OG are set at runtime by
    SeoService (src/app/shared/seo.service.ts) during prerender.
    ============================================================
  -->

  <title>A Night of Angels | All-White Luxury Dinner Experience · Lagos</title>
  <base href="/">

  <!-- Apply the saved light/dark theme before first paint (no flash). Light is the default. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('noa-theme');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

<body>
  <!--
    Static form for Netlify Forms detection (scanned at build time).
    The visible, interactive form lives in the Angular /sponsor page and
    submits to this same form name via fetch. Keep field names in sync.
  -->
  <form name="sponsor" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <input type="tel" name="phone" />
    <input type="text" name="tier" />
    <input type="text" name="budget" />
    <textarea name="message"></textarea>
    <input type="text" name="bot-field" />
  </form>

  <app-root></app-root>

  <!--
    ============================================================
    ANALYTICS & MARKETING PIXELS — inert until you activate them.
    Nothing below loads (no extra requests, no perf cost) until you
    fill these in, so it's safe to ship as-is.

      1) PLAUSIBLE (privacy-friendly, no cookie banner needed):
         create a site for "nightofangels2026.com" at plausible.io,
         then change ENABLE_PLAUSIBLE to true.
      2) META (Facebook/Instagram) PIXEL — for retargeting ads:
         paste your numeric Pixel ID into META_PIXEL_ID.
    ============================================================
  -->
  <script>
    (function () {
      var ENABLE_PLAUSIBLE = false;
      var META_PIXEL_ID = ''; // e.g. '123456789012345'

      if (ENABLE_PLAUSIBLE) {
        var p = document.createElement('script');
        p.defer = true;
        p.setAttribute('data-domain', 'nightofangels2026.com');
        p.src = 'https://plausible.io/js/script.js';
        document.head.appendChild(p);
      }

      if (META_PIXEL_ID) {
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n; n.loaded = !0; n.version = '2.0'; n.queue = [];
          t = b.createElement(e); t.async = !0; t.src = v;
          s = b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t, s);
        })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
        window.fbq('init', META_PIXEL_ID);
        window.fbq('track', 'PageView');
      }
    })();
  </script>
</body>
