<!doctype html>
<html lang="en">
<head>

  <!--

    with your real production domain before launch.

  <title>A Night of Angels | All-White Luxury Dinner Experience · Lagos</title>
  <base href="/">

  <!-- Apply the saved light/dark theme before first paint (no flash). Light is the default. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('noa-theme');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A Night of Angels — an exclusive all-white luxury dinner experience in Lagos, Nigeria. Reserve your seat, book a table, or become a partner for an unforgettable evening.">
  <meta name="keywords" content="all-white party Lagos, luxury dinner Lagos, exclusive event Lagos Nigeria, A Night of Angels, white themed gala, VIP dinner experience">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="index, follow, max-image-preview:large">

  <!-- Structured data: Event (drives Google rich results) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Event",
    "name": "A Night of Angels",
    "description": "An exclusive all-white luxury dinner experience in Lagos, Nigeria.",
    "startDate": "2026-09-19T19:00:00+01:00",
    "eventStatus": "https://schema.org/EventScheduled",
    "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
    "image": "https://nightofangels.com/og-image.jpg",
    "url": "https://nightofangels.com/",
    "location": {
      "@type": "Place",
      "name": "Private Venue, Lagos",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lagos",
        "addressCountry": "NG"
      }
    },
    "organizer": {
      "@type": "Organization",
      "name": "A Night of Angels",
      "url": "https://nightofangels.com/"
    },
    "offers": {
      "@type": "Offer",
      "url": "https://nightofangels.com/#tickets",
      "availability": "https://schema.org/InStock",
      "priceCurrency": "NGN"
    }
  }
  </script>

  <!-- Structured data: Organization + WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "name": "A Night of Angels",
        "url": "https://nightofangels.com/",
        "sameAs": ["https://instagram.com/nightofangels"]
      },
      {
        "@type": "WebSite",
        "name": "A Night of Angels",
        "url": "https://nightofangels.com/"
      }
    ]
  }
  </script>

  <!-- Structured data: FAQPage (eligible for FAQ rich snippets) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Where is the venue?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The venue is a private address in Lagos, revealed to confirmed guests ahead of the evening. This keeps the gathering intimate and secure for everyone in the room."
        }
      },
      {
        "@type": "Question",
        "name": "Is the dress code strictly enforced?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. All-white attire is essential — it is the heart of the experience. Guests who are not in white may be asked to adjust before entry."
        }
      },
      {
        "@type": "Question",
        "name": "Can a company book a full table?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Absolutely. A Table seats ten and is popular with companies hosting clients or teams. Tables can also be bundled into a wider sponsorship package — reach out and we will tailor it."
        }
      },
      {
        "@type": "Question",
        "name": "Is there an age requirement?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes — A Night of Angels is strictly for guests aged 18 and over."
        }
      },
      {
        "@type": "Question",
        "name": "What is the refund policy?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Refund and transfer terms are confirmed at the point of booking, so you will have the full details before any payment is completed."
        }
      }
    ]
  }
  </script>
</head>
<body>
  <!--
    Static form for Netlify Forms detection (scanned at build time).
    The visible, interactive form lives in the Angular /sponsor page and
    submits to this same form name via fetch. Keep field names in sync.
  -->
  <form name="sponsor" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <input type="tel" name="phone" />
    <input type="text" name="tier" />
    <input type="text" name="budget" />
    <textarea name="message"></textarea>
    <input type="text" name="bot-field" />
  </form>

  <app-root></app-root>
</body>
</html>
